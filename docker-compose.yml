version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_backend
    environment:
      - DEBUG=True
    volumes:
      - .:/app
      - sqlite_data:/app  # Persist the entire /app directory, including db.sqlite3
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media    # Optional: For Django media files
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  sqlite_data:

networks:
  app-network:
    driver: bridge